<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Hotel Reservas</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">
        <aside class="sidebar"> 
            <div class="logo">
                <img src="../wireframes/logo.png" alt="imagem-hotel">
                <div> Hotel<br>Reservas</div>
            </div>
            <nav class="menu">
                <button onclick="mostrarQuartos()">
                    Quartos
                </button>
            </nav>
        </aside>

        <main class="content">
            <section id="telaQuartos">
                <div class="topo">
                    <div>

                        <h2>Quartos Cadastrados</h2>
                        <p>Gerencie os quartos do hotel</p>

                    </div>

                    <button class="btn-azul" onclick="abrirModalQuarto()">
                        + Novo Quarto
                    </button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>Nº Quarto</th>
                            <th>Tipo</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="listaQuartos">

                    </tbody>
                </table>
            </section>

            <section id="telaReservas" class="oculto">
                <div class="topo">
                    <div>

                        <h2 id="tituloReserva">Reservas do Quarto</h2>
                        <p id="tipoReserva"></p>

                    </div>

                    <button class="btn-azul" onclick="abrirModalReserva()">
                        + Nova Reserva
                    </button>
                </div>

                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Hóspede</th>
                            <th>Entrada</th>
                            <th>Saída</th>
                            <th>Ações</th>
                        </tr>
                    </thead>

                    <tbody id="listaReservas">

                    </tbody>
                </table>


                <button class="voltar" onclick="mostrarQuartos()">

                    <- Voltar

                </button>

            </section>

        </main>

    </div>

    <div id="modalQuarto" class="modal oculto">
        <div class="modal-box">

            <span class="fechar" onclick="fecharModalQuarto()">

                x

            </span>

            <h2>Cadastro de Quarto</h2>

            <label>
                Número do Quarto
            </label>

            <input type="text" id="numero" placeholder="Ex: 101">

            <label>
                Tipo do Quarto
            </label>

            <select id="tipo">

                <option disabled selected>

                    Selecione o tipo

                </option>

                <option>
                    Standard
                </option>

                <option>
                    Luxo
                </option>

                <option>
                    Suite
                </option>

            </select>

            <button class="btn-azul" onclick="cadastrarQuarto()">
                Cadastrar
            </button>

        </div>

    </div>

    <div id="modalReserva" class="modal oculto">

        <div class="modal-box">

            <span class="fechar" onclick="fecharModalReserva()">
                x
            </span>

            <h2>Cadastro de Reserva</h2>

            <label>
                Nome do Hóspede
            </label>

            <input type="text" id="hospede" placeholder="Ex: João Silva">


            <label>
                Data Entrada
            </label>

            <input type="date" id="entrada">


            <label>
                Data Saída
            </label>

            <input type="date" id="saida">


            <button class="btn-azul" onclick="cadastrarReserva()">
                Cadastrar Reserva
            </button>

        </div>

    </div>

    <div id="modalExcluir" class="modal oculto">

        <div class="modal-box pequeno">

            <h2>Excluir</h2>

            <p id="textoExcluir">Tem certeza?</p>

            <div class="acoes">

                <button onclick="fecharModalExcluir()">
                    Cancelar
                </button>

                <button class="btn-vermelho" id="confirmarExcluir">
                    Excluir
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
